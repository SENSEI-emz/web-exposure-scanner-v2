version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: scanner_postgres
    environment:
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: scanner_pass
      POSTGRES_DB: web_scanner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanner"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scanner_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scanner_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://scanner:scanner_pass@postgres:5432/web_scanner
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scanner_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scanner_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - scanner_network

volumes:
  postgres_data:
  redis_data:

networks:
  scanner_network:
    driver: bridge
